<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MoneyWise - Personal Finance Assistant</title>

  <link rel="icon" href="empty.png">
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700,800" rel="stylesheet">
</head>


<body>

<div class="container">


  <!-- Header -->
 <div class="header">

    <div class="logo-title">
        <img src="logo.png" alt="MoneyWise Logo">
        <h1>MoneyWise</h1>
    </div>

    <div class="profile-icon">
        👤
    </div>

</div>



  <!-- Balance Section -->
  <div class="balance-container">

    <h2>Your Balance</h2>

    <h1 id="balance">$0.00</h1>


    <div class="summary">


      <!-- Income -->
      <div class="income">

        <h3>Income</h3>

        <p id="income-amount">
          $0.00
        </p>

      </div>



      <!-- Expenses -->
      <div class="expenses">

        <h3>Expenses</h3>

        <p id="expense-amount">
          $0.00
        </p>

      </div>


    </div>


  </div>




  <!-- Financial Goals -->
  <div class="goal-container">


    <h2>
      📈 Financial Goals
    </h2>


    <div class="goal-inputs">


      <!-- Saving Goal -->
      <div class="form-group">

        <label>
          Saving Goal
        </label>


        <input 
          type="number"
          id="saving-goal"
          placeholder="Enter saving goal">


      </div>



      <!-- Expense Limit -->
      <div class="form-group">


        <label>
          Expense Limit
        </label>


        <input
          type="number"
          id="expense-limit"
          placeholder="Enter expense limit">


      </div>



    </div>


    <!-- Goal Message -->
    <div id="goal-message">

      📊 Set your saving goal and expense limit.

    </div>


  </div>




  <!-- Main Content -->
  <div class="main-content">


    <!-- Transactions -->
    <div class="transaction-container">


      <h2>
        Transactions
      </h2>


      <!-- Search -->
      <div class="search-box">

        <input 
          type="text"
          id="search"
          placeholder="Search by name, date or time">

      </div>



      <!-- Transaction List -->
      <ul id="transaction-list">

      </ul>


    </div>






    <!-- Add Transaction -->
    <div class="form-container">


      <h2>
        Add Transaction
      </h2>


      <form id="transaction-form">


        <!-- Description -->
        <div class="form-group">


          <label>
            Description 
          </label>


          <input 
            type="text"
            id="description"
            placeholder="Enter description"
            required>


        </div>





        <!-- Amount -->
        <div class="form-group">


          <label>
            Amount
          </label>


          <input 
            type="number"
            id="amount"
            placeholder="Enter amount"
            required>


        </div>





        <!-- Transaction Type -->
        <div class="form-group">


          <label>
            Transaction Type
          </label>


          <div class="toggle-container">


            <button 
              type="button"
              id="income-btn"
              class="toggle-btn income-active">

              + Income

            </button>



            <button 
              type="button"
              id="expense-btn"
              class="toggle-btn">


              - Expense


            </button>


          </div>


        </div>


        <small>

          No need to enter negative values.

        </small>



        <!-- Submit Button -->
        <button type="submit">

          Add Transaction

        </button>



      </form>


    </div>


  </div>



</div>



<script src="script.js"></script>


</body>

</html>
